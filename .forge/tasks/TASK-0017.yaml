acceptance_criteria:
  - id: AC-01
    description: v0.2.0 release notes exist under docs/releases/v0.2.0.md.
  - id: AC-02
    description: Release notes summarize lifecycle commands added after v0.1.0.
  - id: AC-03
    description: Release notes include status, task:new, task:stage, artifact:new, task:complete, and workflow:smoke.
  - id: AC-04
    description: Release notes include the current verification baseline.
  - id: AC-05
    description: Release notes include the current test count.
  - id: AC-06
    description: Release notes include a checklist for a later v0.2.0 tag and GitHub release.
  - id: AC-07
    description: This task does not create a tag or GitHub release.
  - id: AC-08
    description: Existing Forge Validator verification still passes.

required_checks:
  - verify
