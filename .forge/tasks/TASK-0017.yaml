schema_version: 1

id: TASK-0017
title: Prepare Forge v0.2.0 release notes
status: in_progress
workflow: .forge/workflows/feature.yaml

goal: Prepare clear Forge v0.2.0 release notes that summarize the lifecycle CLI improvements completed after v0.1.0 and define the release verification checklist.

in_scope:
  - Create v0.2.0 release notes.
  - Summarize completed lifecycle commands.
  - Summarize validation improvements since v0.1.0.
  - Document the current verification baseline.
  - Include the current smoke workflow command.
  - Include the current test count.
  - Include a release checklist for tagging v0.2.0 later.
  - Keep this task documentation-only.
  - Preserve existing Forge Validator behavior.

out_of_scope:
  - Creating a Git tag.
  - Creating a GitHub release.
  - Publishing packages.
  - Changing Forge Validator runtime behavior.
  - Changing lifecycle validation policy.
  - Changing workflow commands.
  - Changing CI configuration.
  - Rewriting historical TASK-0001 through TASK-0016 evidence.

allowed_files:
  - .forge/tasks/TASK-0017.yaml
  - docs/TASKS.md
  - .forge/artifacts/TASK-0017/plan-001.md
  - .forge/artifacts/TASK-0017/build-report-001.md
  - .forge/artifacts/TASK-0017/test-report-001.md
  - .forge/artifacts/TASK-0017/review-report-001.md
  - docs/releases/v0.2.0.md

