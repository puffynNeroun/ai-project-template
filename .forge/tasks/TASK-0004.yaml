acceptance_criteria:
  - id: AC-1
    description: Forge Validator treats proposed tasks as valid without requiring any stage artifacts.
  - id: AC-2
    description: Forge Validator treats blocked tasks as having no additional artifact-presence requirement based only on status, while any existing artifacts still pass TASK-0003 structural validation.
  - id: AC-3
    description: Forge Validator requires approved tasks to have at least one structurally valid plan artifact.
  - id: AC-4
    description: Forge Validator requires in_progress tasks to have at least one structurally valid plan artifact.
  - id: AC-5
    description: Forge Validator requires ready_for_pr tasks to have at least one structurally valid artifact of each type plan, build_report, test_report, and review_report.
  - id: AC-6
    description: Forge Validator requires completed tasks to have at least one structurally valid artifact of each type plan, build_report, test_report, and review_report, except for the explicit TASK-0001 and TASK-0002 legacy exemption.
  - id: AC-7
    description: TASK-0001 and TASK-0002 are exempt from status-aware artifact-presence requirements, no retroactive artifacts are created or fabricated for them, and the exemption does not apply to TASK-0003 or later tasks.
  - id: AC-8
    description: Any structurally valid positive attempt for a required artifact type may satisfy the status-aware presence requirement.
  - id: AC-9
    description: Validation does not introduce latest-attempt, retry-chain, outcome-chain, approval, append-only Git, orchestration, or automatic-transition semantics.
  - id: AC-10
    description: Missing-artifact errors identify both the task status and the missing artifact type.
  - id: AC-11
    description: Tests cover every supported status, valid cases, missing-artifact failures, and TASK-0001/TASK-0002 legacy compatibility while existing Validator tests continue passing.
  - id: AC-12
    description: Documentation explains implemented status-aware presence checks, blocked-status behavior, TASK-0001/TASK-0002 legacy compatibility, and still-deferred lifecycle semantics.
  - id: AC-13
    description: Forge Validator remains read-only, verification passes, and no file outside the approved scope is modified.
  - id: AC-14
    description: docs/TASKS.md tracks TASK-0004 as the current proposed task and shows the same lifecycle status as .forge/tasks/TASK-0004.yaml.

required_checks:
  - verify
