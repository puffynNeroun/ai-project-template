schema_version: 1

id: TASK-0004
title: Require stage artifacts by task status
status: completed
workflow: .forge/workflows/feature.yaml

goal: Add status-aware artifact presence validation to Forge Validator with explicit blocked-status and legacy completed-task compatibility rules, without adding lifecycle orchestration, latest-attempt selection, or outcome-chain semantics.

in_scope:
  - Require no stage artifacts for tasks in proposed status.
  - Require no additional artifact presence based only on blocked status, while still structurally validating any artifacts that exist for blocked tasks, because blocked may be entered from different workflow stages and status alone does not identify the last completed stage.
  - Require at least one structurally valid plan artifact for tasks in approved status.
  - Require at least one structurally valid plan artifact for tasks in in_progress status.
  - Require at least one structurally valid plan, build_report, test_report, and review_report artifact for tasks in ready_for_pr status.
  - Require at least one structurally valid plan, build_report, test_report, and review_report artifact for tasks in completed status, except for the explicit TASK-0001 and TASK-0002 legacy completed-task exemption.
  - Exempt only TASK-0001 and TASK-0002 from status-aware artifact presence requirements because they were completed before persistent live stage artifacts were available.
  - Ensure the legacy compatibility exemption does not apply to TASK-0003 or later tasks.
  - Do not create or fabricate retroactive artifacts for TASK-0001 or TASK-0002.
  - Allow any structurally valid positive attempt for a required artifact type to satisfy status-aware presence validation.
  - Preserve the existing TASK-0003 structural artifact validation as authoritative for artifact validity.
  - Add focused Validator tests for every supported status, valid cases, missing-artifact failures, blocked behavior, and TASK-0001/TASK-0002 legacy compatibility.
  - Update Validator and Forge artifact documentation to describe implemented status-aware artifact presence checks, blocked-status behavior, TASK-0001/TASK-0002 legacy compatibility, and still-deferred lifecycle semantics.
  - Update docs/TASKS.md to track TASK-0004.
  - Preserve role-scoped artifact handoffs so each stage may create only its own new TASK-0004 artifact path under the existing artifact contract.

out_of_scope:
  - Select the latest artifact attempt.
  - Require exact artifact attempts for a task status.
  - Validate retry chains.
  - Validate referenced artifact outcome chains.
  - Require test reports to have PASS outcomes.
  - Require review reports to have ACCEPT outcomes.
  - Validate human approval evidence.
  - Enforce append-only artifact history through Git history.
  - Validate Markdown artifact bodies.
  - Automatically transition task status.
  - Execute agent roles.
  - Add orchestration.
  - Perform GitHub mutation.
  - Add new dependencies or modify package metadata or the lockfile.
  - Broadly refactor Validator architecture.
  - Add a broad migration framework, configuration system, schema-version migration, or new task-contract key for legacy task compatibility.
  - Modify existing tasks, existing artifacts, workflow contracts, role contracts, templates, root project documentation, or GitHub workflow files.
  - Commit, push, create a pull request, merge, release, deploy, publish, or perform other remote mutation.

allowed_files:
  - .forge/tasks/TASK-0004.yaml
  - tools/forge-validator/src/validate.mjs
  - tools/forge-validator/test/validate.test.mjs
  - tools/forge-validator/README.md
  - .forge/artifacts/README.md
  - .forge/README.md
  - docs/TASKS.md

