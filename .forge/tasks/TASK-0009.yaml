schema_version: 1

id: TASK-0009
title: Decide plan/build retry-chain policy
status: approved
workflow: .forge/workflows/feature.yaml

goal: Decide whether Forge Validator should later extend retry-chain validation to plan and build_report artifacts, and document the policy before any implementation work.

in_scope:
  - Evaluate whether plan retry attempts should require a specific previous plan outcome.
  - Evaluate whether build_report retry attempts should require a specific previous build_report outcome.
  - Decide whether plan and build_report retries should remain intentionally unrestricted.
  - Document the chosen policy and the reasoning behind it.
  - Preserve the existing TASK-0008 behavior for test_report and review_report retry chains.
  - Preserve completed task evidence and existing validator behavior unless a later implementation task explicitly changes it.

out_of_scope:
  - Implementing plan retry-chain validation.
  - Implementing build_report retry-chain validation.
  - Changing validator source code.
  - Changing validator tests.
  - Changing package files, lockfiles, or CI workflows.
  - Rewriting completed task artifacts.
  - Creating release tags or deployment artifacts.

allowed_files:
  - .forge/tasks/TASK-0009.yaml
  - docs/TASKS.md
  - .forge/artifacts/TASK-0009/plan-001.md
  - .forge/artifacts/TASK-0009/build-report-001.md
  - .forge/artifacts/TASK-0009/test-report-001.md
  - .forge/artifacts/TASK-0009/review-report-001.md
  - tools/forge-validator/README.md
  - .forge/artifacts/README.md
  - .forge/README.md

