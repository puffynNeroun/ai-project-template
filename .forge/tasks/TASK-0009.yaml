acceptance_criteria:
  - id: AC-01
    description: The task records a clear decision on whether plan retry chains should be validated later.
  - id: AC-02
    description: The task records a clear decision on whether build_report retry chains should be validated later.
  - id: AC-03
    description: The decision explains risks of enforcing retry chains for planning and builder artifacts.
  - id: AC-04
    description: The decision explains whether TASK-0008 test_report and review_report behavior remains unchanged.
  - id: AC-05
    description: The task does not change validator implementation or validator tests.
  - id: AC-06
    description: Forge Validator verification passes.

