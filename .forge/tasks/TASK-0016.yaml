schema_version: 1

id: TASK-0016
title: Add Forge workflow smoke command
status: in_progress
workflow: .forge/workflows/feature.yaml

goal: Add a controlled Forge workflow smoke command that validates the full Forge task lifecycle on a temporary fixture repository from task creation through completion.

in_scope:
  - Add a Forge Validator workflow smoke command.
  - Run the smoke workflow in a temporary fixture repository.
  - Exercise task:new behavior through shared implementation or direct function calls.
  - Exercise planner stage transition.
  - Exercise plan artifact scaffolding.
  - Exercise builder stage transition.
  - Exercise build_report artifact scaffolding.
  - Exercise tester stage transition.
  - Exercise test_report artifact scaffolding.
  - Exercise reviewer stage transition.
  - Exercise review_report artifact scaffolding.
  - Exercise task completion.
  - Assert final task status is completed.
  - Assert final docs/TASKS.md has No active task and Define the next task.
  - Document how to run the smoke command.
  - Add tests for successful smoke workflow behavior.
  - Preserve existing Forge Validator verification behavior.

out_of_scope:
  - Running Git commands.
  - Creating branches, commits, pushes, pull requests, merges, or releases.
  - Testing GitHub Actions remotely.
  - Changing task:new behavior.
  - Changing task:stage behavior.
  - Changing artifact:new behavior.
  - Changing task:complete behavior.
  - Changing validator lifecycle policy.
  - Rewriting historical TASK-0001 through TASK-0015 evidence.

allowed_files:
  - .forge/tasks/TASK-0016.yaml
  - docs/TASKS.md
  - .forge/artifacts/TASK-0016/plan-001.md
  - .forge/artifacts/TASK-0016/build-report-001.md
  - .forge/artifacts/TASK-0016/test-report-001.md
  - .forge/artifacts/TASK-0016/review-report-001.md
