schema_version: 1

id: TASK-0005
title: Select latest artifact attempt for presence validation
status: in_progress
workflow: .forge/workflows/feature.yaml

goal: Make Forge Validator use the highest-numbered existing artifact attempt for each task and artifact type when evaluating status-aware artifact presence, while continuing to structurally validate every live artifact and without adding retry-chain, outcome-chain, approval, or orchestration semantics.

in_scope:
  - Select the latest existing artifact attempt by highest numeric attempt for each task_id and artifact_type pair when evaluating status-aware artifact presence.
  - Treat attempt numbers as numeric values derived from live artifact filenames and checked against artifact front matter when structurally valid.
  - Allow gaps in attempts, so attempt 003 is latest when attempts 001 and 003 exist.
  - Continue structurally validating every discovered live artifact, including non-latest attempts.
  - Require the latest existing attempt for a required artifact type to be structurally valid before it can satisfy status-aware presence.
  - Ensure an earlier valid attempt does not satisfy presence when a later existing attempt for the same task and artifact type is structurally invalid.
  - Ensure an earlier malformed attempt still reports its structural error while a later structurally valid attempt can satisfy presence.
  - Preserve TASK-0004 status-aware presence requirements for proposed, blocked, approved, in_progress, ready_for_pr, and completed tasks.
  - Preserve the explicit completed-task legacy exemption for TASK-0001 and TASK-0002 only.
  - Preserve invalid-task behavior so invalid task contracts do not produce secondary missing-artifact presence errors.
  - Keep artifact outcomes independent from presence decisions.
  - Add focused Validator tests for latest-attempt selection, malformed latest attempts, malformed earlier attempts, attempt gaps, legacy compatibility, and invalid-task cascade prevention.
  - Update Validator and Forge artifact documentation to describe latest-attempt presence semantics and still-deferred lifecycle semantics.
  - Update docs/TASKS.md to track TASK-0005.

out_of_scope:
  - Validate retry chains.
  - Validate referenced artifact outcome chains.
  - Require test reports to have PASS outcomes.
  - Require review reports to have ACCEPT outcomes.
  - Require exact artifact attempts for a task status.
  - Validate human approval evidence.
  - Enforce append-only artifact history through Git history.
  - Validate Markdown artifact bodies.
  - Automatically transition task status.
  - Execute agent roles.
  - Add orchestration.
  - Perform GitHub mutation.
  - Add new dependencies or modify package metadata or the lockfile.
  - Broadly refactor Validator architecture beyond what is needed for latest-attempt selection.
  - Add a migration framework, configuration system, schema-version migration, or new task-contract key.
  - Modify existing tasks, existing artifacts, workflow contracts, role contracts, templates, root project documentation, or GitHub workflow files.
  - Commit, push, create a pull request, merge, release, deploy, publish, or perform other remote mutation.

