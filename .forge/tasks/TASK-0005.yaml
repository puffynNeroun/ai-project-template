acceptance_criteria:
  - id: AC-1
    description: Forge Validator continues structurally validating every discovered live artifact, including non-latest attempts.
  - id: AC-2
    description: For each task_id and artifact_type pair, Forge Validator selects the highest numeric existing attempt as the latest attempt for status-aware presence validation.
  - id: AC-3
    description: Attempt gaps are allowed, so attempt 003 is selected as latest when attempts 001 and 003 exist.
  - id: AC-4
    description: A latest structurally valid attempt satisfies the required artifact type for status-aware presence even if an earlier attempt for the same type is malformed, while the earlier malformed attempt still reports its structural error.
  - id: AC-5
    description: An earlier structurally valid attempt does not satisfy status-aware presence when a later existing attempt for the same task and artifact type is structurally invalid.
  - id: AC-6
    description: Missing-artifact and invalid-latest-attempt errors identify the task id, task status, artifact type, and relevant latest attempt when applicable.
  - id: AC-7
    description: TASK-0004 status-aware requirements for proposed, blocked, approved, in_progress, ready_for_pr, and completed tasks remain intact.
  - id: AC-8
    description: The explicit completed-task legacy exemption remains limited to TASK-0001 and TASK-0002 and does not apply to TASK-0003 or later tasks.
  - id: AC-9
    description: Invalid task contracts do not enter presence validation and do not produce secondary missing-artifact or invalid-latest-attempt errors.
  - id: AC-10
    description: Artifact outcomes do not affect latest-attempt selection or presence satisfaction.
  - id: AC-11
    description: Validation does not introduce retry-chain, outcome-chain, approval, append-only Git, orchestration, or automatic-transition semantics.
  - id: AC-12
    description: Tests cover latest valid attempts, malformed latest attempts, malformed earlier attempts, attempt gaps, status-aware presence preservation, legacy compatibility, invalid-task cascade prevention, and existing structural validation behavior.
  - id: AC-13
    description: Documentation explains latest-attempt presence semantics, malformed latest behavior, attempt gaps, legacy compatibility, and still-deferred lifecycle semantics.
  - id: AC-14
    description: Forge Validator remains read-only, verification passes, and no file outside the approved scope is modified.
  - id: AC-15
    description: docs/TASKS.md tracks TASK-0005 as the current proposed task and shows the same lifecycle status as .forge/tasks/TASK-0005.yaml.

required_checks:
  - verify
