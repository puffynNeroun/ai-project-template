schema_version: 1

id: TASK-0006
title: Require delivery-ready artifact outcomes
status: in_progress
workflow: .forge/workflows/feature.yaml

goal: Make Forge Validator require successful latest test and review artifact outcomes for delivery-ready task statuses, while preserving structural validation, latest-attempt selection, existing status-aware artifact presence rules, and without adding retry-chain, outcome-chain, approval, or orchestration semantics.

in_scope:
  - Require tasks with status ready_for_pr to have latest test_report outcome PASS.
  - Require tasks with status ready_for_pr to have latest review_report outcome ACCEPT.
  - Require non-legacy tasks with status completed to have latest test_report outcome PASS.
  - Require non-legacy tasks with status completed to have latest review_report outcome ACCEPT.
  - Use the latest existing artifact attempt selected by highest numeric filename attempt for each task_id and artifact_type pair.
  - Continue structurally validating every discovered live artifact, including non-latest attempts.
  - Run outcome validation only after the relevant latest artifact is structurally valid enough to satisfy status-aware presence.
  - Avoid secondary outcome errors when the latest required artifact is missing or structurally invalid because existing missing-artifact and invalid-latest-attempt errors already cover those cases.
  - Preserve TASK-0004 status-aware presence requirements for proposed, blocked, approved, in_progress, ready_for_pr, and completed tasks.
  - Preserve TASK-0005 latest-attempt selection semantics, including numeric comparison and allowed attempt gaps.
  - Preserve the explicit completed-task legacy exemption for TASK-0001 and TASK-0002 only.
  - Ensure TASK-0003 and later completed tasks must satisfy delivery-ready outcome requirements.
  - Preserve invalid-task behavior so invalid task contracts do not produce secondary missing-artifact, invalid-latest-attempt, or invalid-outcome errors.
  - Keep plan and build_report outcomes independent from delivery-ready outcome validation.
  - Keep approved and in_progress tasks free from test_report and review_report outcome requirements.
  - Add focused Validator tests for ready_for_pr and completed outcome gates, latest-attempt outcome selection, rejected earlier review attempts followed by accepted latest review attempts, failed latest test reports, rejected latest review reports, legacy compatibility, and invalid-task cascade prevention.
  - Update Validator and Forge artifact documentation to describe delivery-ready outcome gates and still-deferred retry-chain/outcome-chain lifecycle semantics.
  - Update docs/TASKS.md to track TASK-0006.

out_of_scope:
  - Validate retry chains.
  - Validate referenced artifact outcome chains.
  - Require plan outcomes for status transitions.
  - Require build_report outcomes for status transitions.
  - Require exact artifact attempts for a task status.
  - Validate human approval evidence.
  - Enforce append-only artifact history through Git history.
  - Validate Markdown artifact bodies.
  - Automatically transition task status.
  - Execute agent roles.
  - Add orchestration.
  - Perform GitHub mutation.
  - Add new dependencies or modify package metadata or the lockfile.
  - Broadly refactor Validator architecture beyond what is needed for delivery-ready outcome validation.
  - Add a migration framework, configuration system, schema-version migration, or new task-contract key.
  - Modify existing tasks, existing artifacts, workflow contracts, role contracts, templates, root project documentation, or GitHub workflow files.
  - Commit, push, create a pull request, merge, release, deploy, publish, or perform other remote mutation.

