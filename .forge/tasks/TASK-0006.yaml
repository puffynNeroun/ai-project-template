acceptance_criteria:
  - id: AC-1
    description: Forge Validator continues structurally validating every discovered live artifact, including non-latest attempts.
  - id: AC-2
    description: TASK-0005 latest-attempt selection remains intact and uses the highest numeric existing attempt for each task_id and artifact_type pair.
  - id: AC-3
    description: Tasks with status ready_for_pr fail validation when the latest structurally valid test_report outcome is not PASS.
  - id: AC-4
    description: Tasks with status ready_for_pr fail validation when the latest structurally valid review_report outcome is not ACCEPT.
  - id: AC-5
    description: Non-legacy tasks with status completed fail validation when the latest structurally valid test_report outcome is not PASS.
  - id: AC-6
    description: Non-legacy tasks with status completed fail validation when the latest structurally valid review_report outcome is not ACCEPT.
  - id: AC-7
    description: Earlier failed or rejected attempts do not fail delivery-ready outcome validation when a later latest structurally valid attempt has the required successful outcome.
  - id: AC-8
    description: Latest failed or rejected attempts are not hidden by earlier successful attempts.
  - id: AC-9
    description: Missing-artifact and invalid-latest-attempt errors are not duplicated by secondary invalid-outcome errors.
  - id: AC-10
    description: Proposed, blocked, approved, and in_progress statuses do not require test_report PASS or review_report ACCEPT outcomes.
  - id: AC-11
    description: TASK-0001 and TASK-0002 remain the only completed-task legacy exemptions, while TASK-0003 and later completed tasks must satisfy delivery-ready outcome gates.
  - id: AC-12
    description: Invalid task contracts do not enter presence or outcome validation and do not produce secondary missing-artifact, invalid-latest-attempt, or invalid-outcome errors.
  - id: AC-13
    description: Outcome validation does not introduce retry-chain, referenced outcome-chain, approval, append-only Git, orchestration, or automatic-transition semantics.
  - id: AC-14
    description: Outcome error messages identify the task id, task status, artifact type, latest attempt, actual outcome, expected outcome, and artifact path.
  - id: AC-15
    description: Tests cover ready_for_pr and completed outcome gates, latest outcome selection, earlier failed or rejected attempts followed by successful latest attempts, failed latest attempts, rejected latest attempts, legacy compatibility, invalid-task cascade prevention, and preservation of existing structural validation behavior.
  - id: AC-16
    description: Documentation explains delivery-ready latest-outcome gates, legacy compatibility, and still-deferred retry-chain and outcome-chain semantics.
  - id: AC-17
    description: Forge Validator remains read-only, verification passes, and no file outside the approved scope is modified.
  - id: AC-18
    description: docs/TASKS.md tracks TASK-0006 as the current proposed task and shows the same lifecycle status as .forge/tasks/TASK-0006.yaml.

