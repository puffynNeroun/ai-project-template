schema_version: 1

id: TASK-0007
title: Validate referenced artifact outcome chains
status: proposed
workflow: .forge/workflows/feature.yaml

goal: Make Forge Validator check that artifact input chains are not only structurally valid by artifact type, but also semantically valid by referenced artifact outcome, while avoiding retry-chain semantics and automatic transition semantics.

in_scope:
  - Add a task contract for future referenced artifact outcome-chain validation.
  - Require the future implementation to validate outcome compatibility for artifacts referenced through input_artifacts.
  - Treat referenced outcome-chain validation as separate from TASK-0006 latest delivery-ready outcome gates.
  - Require review_report artifacts to reject input chains that reference a test_report whose outcome is not PASS.
  - Require test_report artifacts to reject input chains that reference a build_report whose outcome is not READY_FOR_TEST.
  - Require build_report artifacts to reject input chains that reference a plan whose outcome is not READY_FOR_APPROVAL.
  - Require test_report artifacts to reject input chains that reference a plan whose outcome is not READY_FOR_APPROVAL.
  - Require review_report artifacts to reject input chains that reference a plan whose outcome is not READY_FOR_APPROVAL.
  - Require review_report artifacts to reject input chains that reference a build_report whose outcome is not READY_FOR_TEST.
  - Keep the referenced outcome compatibility matrix explicit in acceptance criteria.
  - Preserve structural validation of every discovered live artifact, including non-latest attempts.
  - Preserve TASK-0005 latest-attempt selection semantics for status-aware presence and TASK-0006 delivery-ready latest outcome gates.
  - Preserve the explicit completed-task legacy exemption for TASK-0001 and TASK-0002 only.
  - Preserve TASK-0006 delivery-ready latest outcome gates for ready_for_pr and non-legacy completed tasks.
  - Preserve invalid-task behavior so invalid task contracts do not produce secondary referenced-outcome-chain errors.
  - Avoid secondary referenced-outcome-chain errors when a referenced artifact is missing or structurally invalid because existing input and structural checks already cover those cases.
  - Add focused Validator tests for positive and negative referenced outcome-chain cases, cascade prevention, deterministic behavior, and preservation of existing validation behavior.
  - Update Validator and Forge artifact documentation to describe referenced outcome-chain validation and still-deferred retry-chain lifecycle semantics.
  - Update docs/TASKS.md to track TASK-0007.

out_of_scope:
  - Implement source, tests, or documentation as part of this task-definition change.
  - Validate retry chains.
  - Validate whether a later artifact supersedes a referenced earlier artifact in an input chain.
  - Require references to point to latest artifact attempts.
  - Change TASK-0006 latest delivery-ready outcome gates.
  - Add new latest-artifact outcome gates beyond TASK-0006.
  - Validate human approval evidence.
  - Enforce append-only artifact history through Git history.
  - Validate Markdown artifact bodies.
  - Automatically transition task status.
  - Execute agent roles.
  - Add orchestration.
  - Perform GitHub mutation.
  - Add new dependencies or modify package metadata or the lockfile.
  - Broadly refactor Validator architecture beyond what is needed for referenced outcome-chain validation.
  - Add a migration framework, configuration system, schema-version migration, or new task-contract key.
  - Modify existing tasks, existing artifacts, workflow contracts, role contracts, templates, root project documentation, or GitHub workflow files.
  - Commit, push, create a pull request, merge, release, deploy, publish, or perform other remote mutation.

