acceptance_criteria:
  - id: AC-1
    description: The task clearly separates referenced outcome-chain validation for input_artifacts from retry-chain validation, latest-attempt outcome validation, orchestration, and automatic task transitions.
  - id: AC-2
    description: The future Validator behavior is deterministic by sorting discovered artifacts and referenced input paths before producing referenced-outcome-chain errors.
  - id: AC-3
    description: The explicit allowed referenced outcome matrix is build_report referencing plan requires READY_FOR_APPROVAL; test_report referencing plan requires READY_FOR_APPROVAL; test_report referencing build_report requires READY_FOR_TEST; review_report referencing plan requires READY_FOR_APPROVAL; review_report referencing build_report requires READY_FOR_TEST; review_report referencing test_report requires PASS.
  - id: AC-4
    description: A review_report that references a test_report with outcome FAIL, BLOCKED, or any outcome other than PASS fails referenced outcome-chain validation.
  - id: AC-5
    description: A test_report that references a build_report with outcome BLOCKED or any outcome other than READY_FOR_TEST fails referenced outcome-chain validation.
  - id: AC-6
    description: A build_report, test_report, or review_report that references a plan with outcome BLOCKED or any outcome other than READY_FOR_APPROVAL fails referenced outcome-chain validation when that pair is covered by the matrix.
  - id: AC-7
    description: A review_report that references a build_report with outcome BLOCKED or any outcome other than READY_FOR_TEST fails referenced outcome-chain validation.
  - id: AC-8
    description: Positive chains pass when a build_report references a READY_FOR_APPROVAL plan, a test_report references READY_FOR_APPROVAL plan and READY_FOR_TEST build_report artifacts, and a review_report references READY_FOR_APPROVAL plan, READY_FOR_TEST build_report, and PASS test_report artifacts.
  - id: AC-9
    description: Missing referenced artifacts and structurally invalid referenced artifacts continue to be handled by existing input and structural validation without secondary referenced-outcome-chain errors.
  - id: AC-10
    description: Invalid task contracts do not produce secondary referenced-outcome-chain errors.
  - id: AC-11
    description: Forge Validator continues structurally validating every discovered live artifact, including non-latest attempts.
  - id: AC-12
    description: TASK-0005 latest-attempt selection remains intact and referenced outcome-chain validation does not require input_artifacts to reference the latest attempt.
  - id: AC-13
    description: TASK-0001 and TASK-0002 remain the only completed-task legacy exemptions, and TASK-0003 and later completed tasks remain non-exempt.
  - id: AC-14
    description: TASK-0006 delivery-ready latest outcome gates for ready_for_pr and non-legacy completed tasks remain intact and separate from referenced input artifact outcome validation.
  - id: AC-15
    description: Tests cover positive chains, failing review_report to test_report references, failing test_report to build_report references, failing plan and build_report references, missing and structurally invalid referenced artifact cascade prevention, invalid-task cascade prevention, deterministic error ordering, and preservation of existing latest-attempt and delivery-ready outcome behavior.
  - id: AC-16
    description: Documentation explains referenced artifact outcome-chain validation, the exact matrix, cascade-prevention behavior, and still-deferred retry-chain, append-only Git, human approval, orchestration, and automatic-transition semantics.
  - id: AC-17
    description: Forge Validator remains read-only, verification passes, and no file outside the approved scope is modified.
  - id: AC-18
    description: docs/TASKS.md tracks TASK-0007 as the current proposed task and shows the same lifecycle status as .forge/tasks/TASK-0007.yaml.

required_checks:
  - verify
