schema_version: 1

id: TASK-0018
title: Add project bootstrap documentation
status: completed
workflow: .forge/workflows/feature.yaml

goal: Add clear project bootstrap documentation that explains how to start a real product from this template after the v0.2.0 release.

in_scope:
  - Create docs/BOOTSTRAP_PROJECT.md.
  - Explain how to create a new repository from this template.
  - Explain how to clone and enter the project locally.
  - Explain how to verify the template before starting work.
  - Explain how to rename and adapt the project.
  - Explain what files to edit first for a real product.
  - Explain how to start the first Forge task.
  - Explain how to use the Forge lifecycle commands.
  - Explain how to use the template with Cursor, Codex, or another AI assistant.
  - Include a Pixardia-oriented example.
  - Keep this task documentation-only.
  - Preserve existing Forge Validator behavior.

out_of_scope:
  - Changing Forge Validator runtime behavior.
  - Changing lifecycle validation policy.
  - Creating a new project repository.
  - Creating or pushing tags.
  - Creating GitHub releases.
  - Publishing packages.
  - Changing CI configuration.
  - Rewriting historical TASK-0001 through TASK-0017 evidence.

