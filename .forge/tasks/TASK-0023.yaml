schema_version: 1

id: TASK-0023
title: "Prepare Forge v0.2.2 release notes"
status: in_progress
workflow: .forge/workflows/feature.yaml

goal: "Prepare release notes for Forge v0.2.2, summarizing the CLI, README, and demo scenario improvements added after v0.2.1."

in_scope:
  - Add docs/releases/v0.2.2.md.
  - Summarize TASK-0020 packaged Forge CLI improvements.
  - Summarize TASK-0021 README open-source quality improvements.
  - Summarize TASK-0022 demo scenario improvements.
  - Include verification baseline.
  - Include upgrade/readiness notes.
  - Be clear that this task prepares release notes only.
  - Do not create a git tag.
  - Do not create a GitHub release.
  - Preserve existing verification behavior.

out_of_scope:
  - Creating tag v0.2.2.
  - Creating GitHub release v0.2.2.
  - Publishing npm packages.
  - Adding GitHub Pages demo.
  - Changing CLI behavior.
  - Changing validator behavior.
  - Changing workflow contracts or role contracts.
  - Editing completed TASK-0001..TASK-0022 contracts or artifacts.
  - Editing prior release notes except by reference.

allowed_files:
  - .forge/tasks/TASK-0023.yaml
  - docs/TASKS.md
