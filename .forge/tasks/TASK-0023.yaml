acceptance_criteria:
  - id: AC-01
    description: docs/releases/v0.2.2.md exists.
  - id: AC-02
    description: Release notes summarize TASK-0020, TASK-0021, and TASK-0022.
  - id: AC-03
    description: Release notes clearly state that v0.2.2 focuses on public presentation and usability.
  - id: AC-04
    description: Release notes include verification baseline with 214 tests passing.
  - id: AC-05
    description: Release notes do not claim that tag v0.2.2 or GitHub release v0.2.2 has already been created.
  - id: AC-06
    description: Release notes do not claim npm publishing, GitHub Pages demo, agent runner, UI, SaaS, or Telegram approvals.
  - id: AC-07
    description: Forge status, workflow smoke, and verify pass after release notes are added.

required_checks:
