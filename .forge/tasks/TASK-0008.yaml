acceptance_criteria:
  - id: AC-1
    description: test_report attempt 1 remains valid without a previous test_report attempt.
  - id: AC-2
    description: review_report attempt 1 remains valid without a previous review_report attempt.
  - id: AC-3
    description: test_report attempt N greater than 1 passes retry-chain validation when attempt N-1 exists and has outcome FAIL.
  - id: AC-4
    description: test_report attempt N greater than 1 fails retry-chain validation when attempt N-1 exists and has outcome PASS.
  - id: AC-5
    description: review_report attempt N greater than 1 passes retry-chain validation when attempt N-1 exists and has outcome REJECT.
  - id: AC-6
    description: review_report attempt N greater than 1 fails retry-chain validation when attempt N-1 exists and has outcome ACCEPT.
  - id: AC-7
    description: Missing previous retry attempts do not produce duplicate retry-chain errors when existing validation already reports the structural issue.
  - id: AC-8
    description: Structurally invalid previous retry attempts do not produce duplicate retry-chain errors.
  - id: AC-9
    description: Artifacts belonging to invalid task contracts do not produce secondary retry-chain errors.
  - id: AC-10
    description: TASK-0005 latest-attempt selection behavior continues to pass.
  - id: AC-11
    description: TASK-0006 delivery-ready latest outcome gate behavior continues to pass.
  - id: AC-12
    description: TASK-0007 exact input_artifacts referenced outcome-chain validation continues to pass.
  - id: AC-13
    description: Forge Validator remains read-only, verification passes, and no file outside the approved scope is modified.
  - id: AC-14
    description: docs/TASKS.md tracks TASK-0008 as the current proposed task and shows the same lifecycle status as .forge/tasks/TASK-0008.yaml.

required_checks:
  - verify
