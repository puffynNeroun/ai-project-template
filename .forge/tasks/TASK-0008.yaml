schema_version: 1

id: TASK-0008
title: Validate artifact retry chains
status: approved
workflow: .forge/workflows/feature.yaml

goal: Make Forge Validator check that repeated test_report and review_report artifact attempts form valid retry chains, while preserving latest-attempt selection, delivery-ready outcome gates, referenced outcome-chain validation, and existing structural artifact validation.

in_scope:
  - Add a task contract for future artifact retry-chain validation.
  - Validate retry chains for test_report artifacts with attempt greater than 1.
  - Validate retry chains for review_report artifacts with attempt greater than 1.
  - Require test_report attempt N greater than 1 to have previous same-type attempt N-1 with outcome FAIL.
  - Require review_report attempt N greater than 1 to have previous same-type attempt N-1 with outcome REJECT.
  - Keep test_report attempt 1 valid without a previous test_report attempt.
  - Keep review_report attempt 1 valid without a previous review_report attempt.
  - Preserve existing attempt-gap behavior unless a retry-chain rule explicitly needs the previous same-type attempt.
  - Avoid secondary retry-chain errors when the previous retry attempt is missing and existing structural or input validation already reports the relevant issue.
  - Avoid secondary retry-chain errors when the previous retry attempt is structurally invalid.
  - Avoid retry-chain errors for artifacts belonging to invalid task contracts.
  - Preserve TASK-0005 latest-attempt selection behavior.
  - Preserve TASK-0006 delivery-ready latest outcome gates.
  - Preserve TASK-0007 exact input_artifacts referenced outcome-chain validation.
  - Preserve TASK-0001 and TASK-0002 completed-task legacy exemptions.
  - Add focused Validator tests for positive retry chains, invalid retry chains, cascade prevention, non-latest behavior, and preservation of existing validation behavior.
  - Update relevant Forge Validator and artifact documentation.
  - Update docs/TASKS.md to track TASK-0008.

out_of_scope:
  - Implement source, tests, or documentation as part of this task-definition change.
  - Validate retry chains for plan artifacts.
  - Validate retry chains for build_report artifacts.
  - Infer retry chains from Git history.
  - Enforce append-only artifact history through Git history.
  - Require human approval evidence.
  - Validate Markdown artifact bodies.
  - Add runtime orchestration.
  - Automatically transition task status.
  - Execute agent roles.
  - Add new dependencies or modify package metadata or the lockfile.
  - Change CI or release workflows.
  - Create a release.
  - Modify existing completed task contracts.
  - Modify existing completed task artifacts.
  - Modify workflow contracts, role contracts, templates, root project documentation, or GitHub workflow files.
  - Commit, push, create a pull request, merge, release, deploy, publish, or perform other remote mutation.

